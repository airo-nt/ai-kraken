# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    App\Infrastructure\Client\Telegram\TelegramClient:
        arguments:
            $botBaseUri: '%env(TELEGRAM_BOT_BASE_URI)%'
            $botToken: '%env(TELEGRAM_BOT_TOKEN)%'
    App\Infrastructure\Client\Telegram\TelegramClientLogDecorator:
        decorates: App\Infrastructure\Client\Telegram\TelegramClient
        arguments:
            $telegramClient: '@App\Infrastructure\Client\Telegram\TelegramClientLogDecorator.inner'
    App\Application\Client\Telegram\TelegramClientInterface:
        alias: App\Infrastructure\Client\Telegram\TelegramClientLogDecorator

    App\Infrastructure\Client\Ai\GithubAiClientLogDecorator:
        decorates: App\Infrastructure\Client\Ai\GithubAiClient
        arguments:
            $inner: '@App\Infrastructure\Client\Ai\GithubAiClientLogDecorator.inner'
    App\Application\Client\Ai\AiClientInterface:
        alias: App\Infrastructure\Client\Ai\GithubAiClientLogDecorator

    App\Application\Command\ProcessBotUpdateCommandHandler:
        tags:
            - { name: 'messenger.message_handler', bus: 'command.bus' }

    App\Application\Query\GetChatsQueryHandler:
        tags:
            - { name: 'messenger.message_handler', bus: 'query.bus' }

    App\Infrastructure\Bus\CommandBus:
        arguments:
            $bus: '@command.bus'

    App\Infrastructure\Bus\QueryBus:
        arguments:
            $messageBus: '@query.bus'

    App\Infrastructure\Security\ApiTokenAuthenticator:
        arguments:
            $apiToken: '%env(X_API_TOKEN)%'
